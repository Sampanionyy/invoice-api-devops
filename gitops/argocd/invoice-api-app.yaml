apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: invoice-api
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Sampanionyy/invoice-api-devops.git
    targetRevision: HEAD
    path: helm/invoice-api
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: invoice
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
