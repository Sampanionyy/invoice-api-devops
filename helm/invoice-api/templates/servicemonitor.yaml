apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "invoice-api.fullname" . }}
  namespace: monitoring
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: {{ include "invoice-api.fullname" . }}
  namespaceSelector:
    matchNames:
      - invoice
  endpoints:
    - port: "3000"
      path: /metrics
      interval: 15s
